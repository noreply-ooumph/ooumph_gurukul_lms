function log(msg, type='info') {
  const el = document.getElementById('log');
  el.innerHTML += `\n<span class="${type}">${msg}</span>`;
  el.scrollTop = el.scrollHeight;
}

async function runSeed() {
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = 'Running...';
  document.getElementById('log').innerHTML = '';

  log('Starting seed — creating ' + USERS.length + ' users...', 'info');
  log('─'.repeat(60), 'info');

  let created = 0, updated = 0, failed = 0;

  for (const u of USERS) {
    try {
      // Try creating user via admin API
      const { data, error } = await adminSb.auth.admin.createUser({
        email: u.email,
        password: u.password,
        email_confirm: true,
        user_metadata: { full_name: u.full_name, role: u.role }
      });

      if (error) {
        if (error.message.includes('already been registered') || error.message.includes('already exists')) {
          // User exists — update password via admin API
          const { data: listData } = await adminSb.auth.admin.listUsers();
          const existing = listData?.users?.find(x => x.email === u.email);
          if (existing) {
            await adminSb.auth.admin.updateUserById(existing.id, {
              password: u.password,
              email_confirm: true,
              user_metadata: { full_name: u.full_name, role: u.role }
            });
            log(`↻ Updated: ${u.email}`, 'warn');
            updated++;
          }
        } else {
          log(`✗ Failed: ${u.email} — ${error.message}`, 'err');
          failed++;
          continue;
        }
      } else {
        log(`✓ Created: ${u.email}`, 'ok');
        created++;
      }

      // Update profile
      await adminSb.from('profiles').upsert({
        id: data?.user?.id || (await adminSb.auth.admin.listUsers()).data?.users?.find(x => x.email === u.email)?.id,
        full_name: u.full_name,
        email: u.email,
        phone: u.phone,
        qualification: u.qualification,
        role: u.role,
        track: u.track
      }, { onConflict: 'email' });

    } catch(e) {
      log(`✗ Error: ${u.email} — ${e.message}`, 'err');
      failed++;
    }
  }

  // Final profile sync using email match
  log('─'.repeat(60), 'info');
  log('Syncing profiles...', 'info');

  const { data: allUsers } = await adminSb.auth.admin.listUsers({ perPage: 200 });
  for (const u of USERS) {
    const authUser = allUsers?.users?.find(x => x.email === u.email);
    if (authUser) {
      await adminSb.from('profiles').upsert({
        id: authUser.id,
        full_name: u.full_name,
        email: u.email,
        phone: u.phone,
        qualification: u.qualification,
        role: u.role,
        track: u.track
      }, { onConflict: 'id' });
    }
  }

  log('─'.repeat(60), 'info');
  log(`Done! Created: ${created} | Updated: ${updated} | Failed: ${failed}`, created+updated > 0 ? 'ok' : 'err');
  log(' ', 'info');

  log('  Super Admins      → Admin@Ooumph123', 'ok');
  log(' ', 'info');
  log('You can now close this page and delete seed-users.html from GitHub.', 'warn');

  btn.textContent = '✓ Done';
}
